<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mens Clear | Price Simulator</title>
    <style>
        :root {
            --brand-blue: #0099ff; /* 清潔感のある水色 */
            --light-blue: #e3f2fd;
            --dark-navy: #2c3e50;
            --bg-gray: #f0f4f8;
            --white: #ffffff;
        }

        body {
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--dark-navy);
            padding-bottom: 50px;
        }

        .app-container {
            max-width: 500px;
            width: 90%;
            background: var(--white);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            margin: 40px 0;
        }

        h1 {
            font-size: 1.3em;
            text-align: center;
            color: var(--brand-blue);
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: 0.05em;
        }

        .plan-item {
            background: var(--light-blue);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            border: 1px solid rgba(0, 153, 255, 0.1);
        }

        select {
            border: 1px solid #ced4da;
            border-radius: 10px;
            padding: 10px;
            font-size: 0.95em;
            background-color: var(--white);
            outline: none;
        }

        .plan-name-select { width: 50%; }
        .plan-times-select { width: 25%; }
        .plan-price { width: 25%; text-align: right; font-weight: bold; color: var(--brand-blue); font-size: 1.1em; }

        .payment-area {
            margin: 25px 0;
            padding: 20px;
            background: #f8fbff;
            border-radius: 16px;
            text-align: center;
        }

        .btn-create {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--brand-blue) 0%, #007acc 100%);
            color: var(--white);
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 153, 255, 0.3);
            transition: all 0.3s;
        }

        .btn-create:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 153, 255, 0.4); }

        /* --- 高級感のあるPOPデザイン --- */
        .pop-container {
            display: none;
            margin-top: 40px;
            position: relative;
            background: var(--white);
            border-radius: 30px;
            padding: 45px 35px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            overflow: hidden;
