<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脱毛料金シミュレーター＆POP作成</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            line-height: 1.6;
        }
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 1.5em;
            text-align: center;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
            margin-bottom: 25px;
            color: #444;
        }
        .plan-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 15px;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 6px;
            gap: 10px;
        }
        .plan-name-select {
            width: 45%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1em;
        }
        .plan-times-select {
            width: 25%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1em;
        }
        .plan-price {
            width: 30%;
            text-align: right;
            font-weight: bold;
            color: #0056b3;
            font-size: 1.1em;
        }
        .total-area {
            text-align: right;
            font-size: 1.4em;
            font-weight: bold;
            margin: 20px 0;
            padding-top: 15px;
            border-top: 2px solid #e0e0e0;
        }
        .payment-area {
            margin-bottom: 25px;
            background: #eaf2f8;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
        }
        .payment-area label { font-weight: bold; margin-right: 10px; }
        .payment-area select {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1.1em;
        }
        .btn-create {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-create:hover { background-color: #ff5252; }
        
        /* POPのスタイル */
        .pop-container {
            display: none;
            margin-top: 40px;
            background: #fffaf0;
            border: 4px dashed #ffb300;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .pop-title {
            font-size: 1.8em;
            color: #ff6f00;
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .pop-plan-list {
            text-align: left;
            background: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ffe082;
        }
        .pop-plan-list p {
            margin: 8px 0;
            font-size: 1.1em;
            border-bottom: 1px dashed #eee;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .pop-plan-list p:last-child { border-bottom: none; }
        .pop-base-total {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #555;
            text-align: right;
            font-weight: bold;
        }
        .pop-monthly-box {
            background: #ffe082;
            padding: 25px;
            border-radius: 8px;
        }
        .pop-monthly-label {
            font-size: 1.2em;
            font-weight: bold;
            color: #d84315;
        }
        .pop-monthly-price {
            font-size: 3em;
            font-weight: bold;
            color: #bf360c;
            margin: 10px 0;
        }
        .pop-note {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>脱毛料金シミュレーター</h1>

    <div id="plan-container">
        </div>

    <div class="total-area">
        組み合わせ合計: <span id="total-amount">0円</span>
    </div>

    <div class="payment-area">
        <label for="payment-times">お支払い回数</label>
        <select id="payment-times">
            <option value="1">一括払い</option>
            <option value="3">3回払い</option>
            <option value="6">6回払い</option>
            <option value="10">10回払い</option>
            <option value="12">12回払い</option>
            <option value="24">24回払い</option>
            <option value="36">36回払い</option>
        </select>
    </div>

    <button id="btn-create" class="btn-create">POPを作成する</button>

    <div id="pop-container" class="pop-container">
        <div class="pop-title">おすすめプランのご提案</div>
        
        <div id="pop-plan-list" class="pop-plan-list">
            </div>

        <div class="pop-base-total" id="pop-base-total">
            プラン合計: 0円
        </div>

        <div class="pop-monthly-box">
            <div class="pop-monthly-label" id="pop-monthly-label">月々のお支払い</div>
            <div class="pop-monthly-price" id="pop-monthly-price">0円</div>
            <div class="pop-note" id="pop-note"></div>
        </div>
    </div>
</div>

<script>
// スプレッドシートから抽出したデータベース
const planData = {
    "ヒゲ3部位": { "3": 7800, "6": 50000, "12": 90000 },
    "ヒゲ全体": { "6": 68000, "12": 122400 },
    "全身（VIO・ヒゲ除く）": { "3": 90000, "6": 171000, "12": 324000 },
    "VIO（尻含む）": { "3": 40000, "6": 76000, "12": 144000 },
    "鼻下": { "6": 36000, "12": 64800 },
    "口下": { "6": 36000, "12": 64800 },
    "あご下・首": { "6": 48000, "12": 75400 },
    "ほほ": { "6": 36000, "12": 64800 },
    "もみあげ": { "6": 36000, "12": 64800 },
    "腕セット（二の腕・肘下・両脇・手の甲指）": { "3": 42000, "6": 79800, "12": 151200 },
    "足セット（膝上・膝下・足の甲指）": { "3": 42000, "6": 79800, "12": 151200 },
    "胸": { "3": 22000, "6": 41800, "12": 79200 },
    "腹": { "3": 22000, "6": 41800, "12": 79200 },
    "背中": { "3": 22000, "6": 41800, "12": 79200 },
    "二の腕": { "3": 22000, "6": 41800, "12": 79200 },
    "両脇": { "3": 22000, "6": 41800, "12": 79200 },
    "ひじ下": { "3": 22000, "6": 41800, "12": 79200 },
    "手の甲指": { "3": 22000, "6": 41800, "12": 79200 },
    "ひざ上": { "3": 22000, "6": 41800, "12": 79200 },
    "ひざ下": { "3": 22000, "6": 41800, "12": 79200 },
    "足の甲指": { "3": 22000, "6": 41800, "12": 79200 },
    "Vライン": { "3": 22000, "6": 41800, "12": 79200 },
    "Iライン": { "3": 22000, "6": 41800, "12": 79200 },
    "Oライン": { "3": 22000, "6": 41800, "12": 79200 },
    "お尻": { "3": 22000, "6": 41800, "12": 79200 }
};

document.addEventListener("DOMContentLoaded", () => {
    const container = document.getElementById("plan-container");
    const totalDisplay = document.getElementById('total-amount');
    const paymentSelect = document.getElementById('payment-times');
    const btnCreate = document.getElementById('btn-create');
    const popContainer = document.getElementById('pop-container');

    // 合計金額を計算する関数
    function calculateTotal() {
        let total = 0;
        const priceDivs = document.querySelectorAll('.plan-price');
        priceDivs.forEach(div => {
            total += parseInt(div.dataset.price) || 0;
        });
        totalDisplay.textContent = total.toLocaleString() + "円";
        return total;
    }

    // 5枠のプラン選択項目を生成
    for(let i = 0; i < 5; i++) {
        const div = document.createElement("div");
        div.className = "plan-item";
        
        // プラン名のセレクトボックス
        const nameSelect = document.createElement("select");
        nameSelect.className = "plan-name-select";
        nameSelect.innerHTML = `<option value="">プランを選択</option>`;
        Object.keys(planData).forEach(key => {
            nameSelect.innerHTML += `<option value="${key}">${key}</option>`;
        });
        
        // 回数のセレクトボックス
        const timesSelect = document.createElement("select");
        timesSelect.className = "plan-times-select";
        timesSelect.innerHTML = `<option value="0">回数</option>`;
        timesSelect.disabled = true;
        
        // 金額表示枠
        const priceDiv = document.createElement("div");
        priceDiv.className = "plan-price";
        priceDiv.textContent = "0円";
        priceDiv.dataset.price = "0"; // 計算用に持たせる値
        
        // プラン名が変更された時の処理
        nameSelect.addEventListener("change", (e) => {
            const planName = e.target.value;
            timesSelect.innerHTML = `<option value="0">回数</option>`;
            priceDiv.textContent = "0円";
            priceDiv.dataset.price = "0";
            
            if (planName && planData[planName]) {
                timesSelect.disabled = false;
                const timesInfo = planData[planName];
                // データベースから回数と金額の選択肢を生成
                Object.keys(timesInfo).forEach(t => {
                    timesSelect.innerHTML += `<option value="${timesInfo[t]}" data-time="${t}">${t}回</option>`;
                });
            } else {
                timesSelect.disabled = true;
            }
            calculateTotal();
        });
        
        // 回数が変更された時の処理
        timesSelect.addEventListener("change", (e) => {
            const price = parseInt(e.target.value) || 0;
            priceDiv.textContent = price.toLocaleString() + "円";
            priceDiv.dataset.price = price;
            calculateTotal();
        });
        
        div.appendChild(nameSelect);
        div.appendChild(timesSelect);
        div.appendChild(priceDiv);
        container.appendChild(div);
    }

    // POP作成ボタンの処理
    btnCreate.addEventListener('click', () => {
        const total = calculateTotal();
        if (total === 0) {
            alert("プランを1つ以上選択してください。");
            return;
        }

        const times = parseInt(paymentSelect.value);
        let monthly = 0;
        let totalPayment = 0;

        // アドオン利率0.8%の計算
        if (times === 1) {
            monthly = total;
            totalPayment = total;
        } else {
            const addOnRate = 0.008; // 0.8%
            const fee = total * addOnRate * times;
            totalPayment = total + fee;
            monthly = Math.floor(totalPayment / times);
        }

        const popPlanList = document.getElementById('pop-plan-list');
        popPlanList.innerHTML = ''; 

        // 選択されているプランを抽出してPOPに記載
        const planItems = document.querySelectorAll('.plan-item');
        planItems.forEach(item => {
            const nameSelect = item.querySelector('.plan-name-select');
            const timesSelect = item.querySelector('.plan-times-select');
            const priceVal = parseInt(timesSelect.value) || 0;
            
            if (nameSelect.value !== "" && priceVal > 0) {
                const planName = nameSelect.value;
                // 選択されている回数オプションのテキストを取得（例: "6回"）
                const timeText = timesSelect.options[timesSelect.selectedIndex].getAttribute('data-time') + "回";
                
                const p = document.createElement('p');
                p.innerHTML = `<span>${planName} (${timeText})</span> <span>${priceVal.toLocaleString()}円</span>`;
                popPlanList.appendChild(p);
            }
        });

        document.getElementById('pop-base-total').textContent = `プラン合計: ${total.toLocaleString()}円`;
        
        const monthlyLabel = times === 1 ? "一括払い" : `${times}回払い (月々)`;
        document.getElementById('pop-monthly-label').textContent = monthlyLabel;
        document.getElementById('pop-monthly-price').textContent = `${monthly.toLocaleString()}円〜`;
        document.getElementById('pop-note').textContent = times === 1 ? "" : `※アドオン金利0.8%を含みます。分割手数料込みの総支払額: ${totalPayment.toLocaleString()}円`;

        popContainer.style.display = 'block';
        popContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
});
</script>

</body>
</html>
